      <h2 class="with-phntm-cybernetics-logo">About this Demo</h2> 
      <span class="cleaner"></span>
      
      This Gazebo Harmonic simulation runs on a server physically located in N. California, USA.<br>
      Your RTT depends on your geographical distance to the datacenter and your connection quality.<br>
      <br>
      Video feeds are encoded into H.264 using Nvidia GPU and all data streamed over WebRTC
      by the <a href="https://docs.phntm.io/bridge" class="external">Phantom Bridge</a><br>
      <span class="desktop-only">This UI is responsive and available optimised for mobile devices (phones and tables) on the same URL.</span>
      <span class="touch-only">This UI is responsive and available optimised for desktop on the same URL.</span><br>
      <br>
      <b>Robot Controls</b><br>
      <b class="key-mapping">~</b> enables and disables keyboard control<br>
      Use <b class="key-mapping">E</b>, <b class="key-mapping">D</b>, <b class="key-mapping">S</b>, <b class="key-mapping">F</b>
      and <b class="key-mapping">Left</b> &amp; <b class="key-mapping">Right</b> arrow keys to drive the robot<br>
      You can also connect a gamepad and adjust your mappings in the Human Input Dialog (the monkey in top right).<br>
      On mobile devices you can use built-in virtual gamepad.<br>
      <br>
      When multiple peers are connected to this robot, you will see a number like <span class="num-peers">2</span> next to the robot's name.
      Too many connected peers may decrease performance. Robot control is allowed to one peer at the time.
      If someone else is driving, you have to wait.<br>
      <br>
      Some features are disabled in this demo, the simulation is restarted every day.<br>
      <br>
      <b>Privacy Disclaimer</b><br>
      This UI uses your browser's local storage to save some data and <a href="https://analytics.google.com" class="external">Google Analytics</a> for traffic monitoring.<br>
      <input type="checkbox" checked id="map-consent"><label for="map-consent">I AGREE</label></input>
